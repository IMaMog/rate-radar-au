name: Refresh interest-rate snapshot

on:
  schedule:
    # 19:10 UTC = 5:10am AEST daily
    - cron: '10 19 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch all CDR product data
        run: node fetcher/fetch.js

      - name: Commit updated snapshot
        run: |
          git config user.name "rate-radar-bot"
          git config user.email "actions@github.com"
          git add data/snapshot.json
          if git diff --cached --quiet; then
            echo "No rate changes today."
          else
            git commit -m "Daily rate snapshot refresh"
            git push
          fi
